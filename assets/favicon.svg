<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dixit Pambhar — terminal prompt">
  <!-- terminal screen -->
  <rect x="3" y="3" width="58" height="58" rx="15" fill="#080b09"/>
  <rect x="3.75" y="3.75" width="56.5" height="56.5" rx="14.25" fill="none" stroke="#4ef08a" stroke-opacity="0.32" stroke-width="1.5"/>
  <!-- phosphor glow -->
  <g filter="url(#glow)">
    <!-- prompt chevron  > -->
    <path d="M20 22 L33 32 L20 42" stroke="#4ef08a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- blinking cursor  _ -->
    <rect x="36" y="38.5" width="13" height="5.5" rx="2" fill="#4ef08a"/>
  </g>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
